</big></big></big></big>
<div class="Y3BBE" data-sfc-cp="" jsaction="rcuQ6b:&amp;TT0XFe_j|npT2md" jscontroller="zcfIf" data-sfc-root="c" jsuid="TT0XFe_j" data-sfc-cb="" data-hveid="CAEIAxAA" data-complete="true" data-processed="true" style="font-family: Arial,sans-serif; font-size: 16px; line-height: 24px; letter-spacing: normal; margin-top: 12px; margin-bottom: 16px; padding-top: 0px; padding-bottom: 0px; color: rgb(10, 10, 10); font-style: normal; orphans: 2; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; white-space: normal; background-color: rgb(255, 255, 255); text-align: center; font-weight: bold;"><big><big>在 714 體育班，桌球不只是競技，更是意志的磨練。<br>
我們是一群無懼困難的戰士，面對強敵與艱苦訓練，<br>
始終秉持「球不落地，永不放棄」的精神，在汗水中築起堅韌的防線。</big></big></div>
<div class="Y3BBE" data-sfc-cp="" jsaction="rcuQ6b:&amp;TT0XFe_k|npT2md" jscontroller="zcfIf" data-sfc-root="c" jsuid="TT0XFe_k" data-sfc-cb="" data-hveid="CAEIBBAA" data-complete="true" data-processed="true" style="font-family: Arial,sans-serif; font-size: 16px; line-height: 24px; letter-spacing: normal; margin-top: 12px; margin-bottom: 16px; padding-top: 0px; padding-bottom: 0px; color: rgb(10, 10, 10); font-style: normal; orphans: 2; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; white-space: normal; background-color: rgb(255, 255, 255); text-align: center; font-weight: bold;"><big><big>我們追求的更是「文武雙全」。球場上，我們以精準戰術與犀利扣殺制霸對手；<br>
課堂裡，我們將運動員的自律化為求知動力。<br>
我們相信，卓越的大腦能讓球路更靈活，自律的態度能讓未來更開闊。<br>
這就是 714 桌球隊&mdash;&mdash;以勇氣突破挑戰，以智慧書寫榮耀！</big></big></div>
