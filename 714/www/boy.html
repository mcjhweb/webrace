身為體育班的男生，他們擁有比別人更堅韌的意志力與團隊默契。<br>
哨音響起時，他們是全力衝刺、揮汗如雨的戰士，用速度與力量捍衛集體榮譽；<br>
回到教室，他們收起鋒芒，將那份對運動的專注轉化為對知識的渴望，展現出「文能安坐思考，武能場上稱霸」的非凡氣概。</big></big></div>

他們深知，真正的優秀不只是體能的超越，更是品德與學業的兼修。<br>
在 714，熱血是底色，拼搏是常態，他們正以最活潑的姿態，書寫著文武雙全的青春篇章，成為校園裡最亮眼的一道風景線！<br>
