<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
        }

        /* ===== 跑馬燈 ===== */
        .marquee {
            background-color: #3e2723; /* 深棕色背景 */
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee p {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(-100%);
            }
        }

        /* ===== 圖片輪播 ===== */
        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 30px auto;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .carousel {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .carousel img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        /* 控制左右按鈕 */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            font-size: 24px;
            padding: 10px;
            cursor: pointer;
            z-index: 10;
        }

        .prev-btn {
            left: 10px;
        }

        .next-btn {
            right: 10px;
        }

        /* ===== 頁面內容 ===== */
        .content {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<!-- 跑馬燈 -->
<div class="marquee">
    <p>歡迎來到801班的首頁</p>
</div>

<!-- 圖片輪播 -->
<div class="carousel-container">
    <div class="carousel" id="carousel">
        <img src="https://via.placeholder.com/800x400?text=file:///D:/www/pic/event14.jpg" alt="file:///D:/www/pic/event14.jpg">
        <img src="https://via.placeholder.com/800x400?text=圖片2" alt="圖片2">
        <img src="https://via.placeholder.com/800x400?text=圖片3" alt="圖片3">
    </div>

    <!-- 左右切換按鈕 -->
    <button class="carousel-btn prev-btn" onclick="moveSlide(-1)">&#10094;</button>
    <button class="carousel-btn next-btn" onclick="moveSlide(1)">&#10095;</button>
</div>

<!-- 其他頁面內容 -->
<div class="content">
    <h2>歡迎來到我們的網站！</h2>
    <p>這裡是801班的專屬頁面，您可以在這裡找到更多有趣的資訊。</p>
</div>

<script>
    // 圖片輪播功能
    let currentSlide = 0;
    const carousel = document.getElementById('carousel');
    const slides = document.querySelectorAll('.carousel img');

    function moveSlide(direction) {
        currentSlide += direction;

        if (currentSlide < 0) {
            currentSlide = slides.length - 1;
        } else if (currentSlide >= slides.length) {
            currentSlide = 0;
        }

        const newTransformValue = -currentSlide * 100;
        carousel.style.transform = `translateX(${newTransformValue}%)`;
    }
</script>

</body>
</html>
