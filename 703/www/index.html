<!DOCTYPE html>
<html lang="zh-tw">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>703株式會社</title>

<style>

/* 整頁 */

html,body{

margin:0;
width:100%;
height:100%;
overflow:hidden;

/* 背景 */

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
url("22/download.gif");

background-size:cover;
background-position:center;
background-attachment:fixed;

}

/* iframe */

iframe{

width:100%;
height:100%;

border:none;

display:block;

background:transparent;

}

/* 音樂提示 */

#music-tip{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

z-index:999999;

background:
linear-gradient(
45deg,
#38bdf8,
#a855f7,
#f472b6
);

color:white;

padding:26px 42px;

border-radius:26px;

font-size:28px;

font-weight:bold;

text-align:center;

box-shadow:
0 0 25px rgba(255,255,255,0.35),
0 0 55px rgba(168,85,247,0.85);

backdrop-filter:blur(10px);

animation:musicFloat 1.5s infinite alternate;

cursor:pointer;

}

/* 漂浮動畫 */

@keyframes musicFloat{

0%{
transform:
translate(-50%,-50%)
translateY(0px)
scale(1);
}

100%{
transform:
translate(-50%,-50%)
translateY(-12px)
scale(1.03);
}

}

</style>

</head>

<body>

<!-- 音樂提示 -->

<div id="music-tip">

🎵 點擊進入 703株式會社 🎵

</div>

<!-- 背景音樂 -->

<audio id="bgm" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>

<!-- iframe -->

<iframe
name="contentFrame"
src="home.html">
</iframe>

<script>

/* 點一下後播放 */

window.addEventListener("click", function(){

const music = document.getElementById("bgm");

music.play();

/* 隱藏提示 */

document.getElementById("music-tip").style.display = "none";

}, { once:true });

</script>

</body>

</html>
