<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習平台</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #34495e;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 20px;
        }
        .course {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>我的教育網站</h1>
    <p>歡迎來到線上學習平台</p>
</header>

<nav>
    <a href="#courses">課程</a>
    <a href="#video">教學影片</a>
    <a href="#contact">聯絡我們</a>
</nav>

<div class="container">

    <section id="courses">
        <h2>熱門課程</h2>
        <div class="course">
            <h3>HTML 入門</h3>
            <p>學習網站基礎結構與標籤使用。</p>
        </div>
        <div class="course">
            <h3>CSS 設計</h3>
            <p>讓你的網站更美觀與響應式。</p>
        </div>
        <div class="course">
            <h3>JavaScript 基礎</h3>
            <p>增加互動功能與動態效果。</p>
        </div>
    </section>

    <section id="video">
        <h2>教學影片</h2>
        <iframe width="100%" height="400"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            frameborder="0" allowfullscreen>
        </iframe>
    </section>

    <section id="contact">
        <h2>聯絡我們</h2>
        <form>
            <input type="text" placeholder="姓名" required>
            <input type="email" placeholder="Email" required>
            <textarea rows="5" placeholder="你的訊息"></textarea>
            <button type="submit">送出</button>
        </form>
    </section>

</div>

<footer>
    <p>© 2026 我的教育網站</p>
</footer>

</body>
</html>
