<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>813班級網頁</title>
    <style>
        /* 移除 body 預設邊距並設定背景 */
        body {
            margin: 0;
            padding: 0;
            /* 使用藍色漸層取代單色背景，更有現代感 */
            background: linear-gradient(135deg, #CCCCFF 0%, #AACCFF 100%);
            height: 100vh;
            display: flex;
            align-items: center; /* 垂直居中 */
            overflow: hidden;
            font-family: "標楷體", "DFKai-SB", serif;
        }

        header {
            width: 100%;
        }

        /* 美化跑馬燈文字 */
        .scrolling-text {
            color: #333366; /* 深藍色文字，對比更好看 */
            font-size: 28pt; /* 字體加大 */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5); /* 文字陰影 */
        }
    </style>
</head>

<body>

<header>
    <marquee behavior="scroll" direction="right" scrollamount="10">
        <span class="scrolling-text">★歡迎來到813班級網頁★</span>
    </marquee>
</header>

</body>
</html>
