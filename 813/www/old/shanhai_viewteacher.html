<p>老師也常常指導我們上網查詢資料，並且安排報告作業，培養我們整理資訊和表達能力。</p>

<p>透過影片輔助與自主製作報告的過程，我們不僅能夠深入了解課程主題，也提升了獨立思考與合作學習的能力。</p>
<p>老師的教學方式，讓我們在學習中獲得了豐富的經驗與成長。</p>
