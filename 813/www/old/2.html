    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            background-color: #CCCCFF;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        nav {
            width: 100%;
            max-width: 500px; /* 稍微放寬一點點讓並排更美觀 */
        }

        ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap; /* 讓按鈕換行 */
            gap: 12px;
            justify-content: center;
        }

        li {
            flex: 1 1 calc(50% - 12px); /* 兩欄佈局並扣除間距 */
            min-width: 140px; 
        }

        a {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* 改成純白背景更顯眼 */
            color: #4a4a8a;
            text-decoration: none;
            height: 55px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        a:hover {
            background-color: #f0f0ff;
            color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* 手機版改為單欄 */
        @media (max-width: 480px) {
            li {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
