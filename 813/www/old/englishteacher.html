<h1>介紹班導師</h1>

<p><span>姓名：</span>陳○文</p>

<p><span>暱稱：</span>小文</p>

<p><span>學生的介紹：</span></p>

<p>我們班的班導是一位非常和藹可親的英文老師，上課時，總是面帶微笑，對我們耐心指導，讓我們感到輕鬆自在。</p>

<p>她課業盯得不算緊，仍然給我們空間。她是一個幽默風趣的人，學生有時候會跟她開玩笑，她也會親切地回應我們。</p>

<p>沒事的時候，她會播放英文歌曲，讓我們從中認識英文片語，增進英文學習。</p>

<p>老師用她的愛心與智慧，讓我們在知識的海洋中遨遊，收穫滿滿。</p>
