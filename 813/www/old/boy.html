      display: flex;
      flex-direction: column; /* 垂直排列 */

      border: 1px solid #ddd;
      font-size: 16px;
    }

    /* 第一行的藍色背景 */
    tr:nth-child(1) td {
      background-color: #4682B4; /* 深藍色 */
      color: white; /* 白色文字 */
    }

    /* 第二行的背景顏色 */

    /* 調整連結樣式 */
