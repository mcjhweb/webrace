<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #CCCCFF;
        }
        .border-container {
            border: 0px solid #333;
            width: 540px; /* 邊框寬度 */
            height: 405px; /* 邊框高度 */
            overflow: hidden;
            position: relative;
        }
        .image-slider {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            animation: slideShow 6s infinite;
        }
        @keyframes slideShow {
            0% {
                opacity: 1;
                transform: translateX(0);
                z-index: 2;
            }
            45% {
                opacity: 1;
                transform: translateX(0);
                z-index: 2;
            }
            50% {
                opacity: 0;
                transform: translateX(-10%);
                z-index: 1;
            }
            95% {
                opacity: 0;
                transform: translateX(10%);
                z-index: 1;
            }
            100% {
                opacity: 1;
                transform: translateX(0);
                z-index: 2;
            }
        }
        .image1 {
            background-image: url('class.jpg');
            animation-delay: 0s;
        }
        .image2 {
            background-image: url('class01.jpg');
            animation-delay: 3s; /* 延遲3秒切換 */
        }
    </style>
    <meta charset="UTF-8">
	<link rel="stylesheet" href="styles.css"> 
    <title>主要內容</title>
</head>
<body>
    <div class="border-container">
        <div class="image-slider image1"></div>
        <div class="image-slider image2"></div>
    </div>
</body>
</html>
