  <style>
        /* 整體頁面設置 */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #CCCCFF; /* 淺藍色背景 */
            margin: 0;
            padding: 0;
        }

        /* 標題樣式 */
        h1 {
            font-size: 2em;
            color: #2e4a7e; /* 深藍色 */
            margin-top: 20px;
            text-align: center;
        }

        /* 用來包裹表格的容器，確保表格不會被切掉 */
        .table-container {
            width: 100%;
            overflow-x: auto; /* 添加水平滾動條 */
            padding: 0 10px; /* 避免表格與邊緣緊貼 */
        }

        /* 表格樣式 */
        table {
            width: 100%;
            max-width: 100%; /* 保證表格不會超過容器 */
            margin: 20px 0;
            border-collapse: collapse;
            background-color: #ffffff; /* 白色背景 */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* 表格邊框設置 */
        table, th, td {
            border: 1px solid #d1e7ff; /* 淺藍色邊框 */
        }

        th, td {
            padding: 15px;
            text-align: center;
            font-size: 1.1em;
        }

        /* "節/星期" 這一行的樣式 */
        th:first-child {
            background-color: #d1d1d1; /* 灰色背景 */
            color: #333; /* 深色文字 */
        }

        /* 其他表格標題的顏色 */
        th {
            background-color: #4fa3d1; /* 清新藍色 */
            color: white;
        }

        /* 每天的顏色 */
        td:nth-child(2) {
            background-color: #ffeb99; /* 星期一 - 淺黃色 */
        }
        
        td:nth-child(3) {
            background-color: #ffccff; /* 星期二 - 淺粉紅 */
        }
        
        td:nth-child(4) {
            background-color: #d1f0d1; /* 星期三 - 淺綠色 */
        }
        
        td:nth-child(5) {
            background-color: #e0f7fa; /* 星期四 - 淺藍色 */
        }
        
        td:nth-child(6) {
            background-color: #fff2e6; /* 星期五 - 淺橙色 */
        }

        td {
            background-color: #CCCCFF; 
        }

        td a {
            text-decoration: none;
            color: #2e4a7e; /* 深藍色文字 */
            font-weight: bold;
        }

        td a:hover {
            color: #4fa3d1; /* 當懸停時顯示藍色 */
        }

        /* 合併單元格樣式 */
        td[colspan], td[rowspan] {
            background-color: #d8f1fe; /* 淺藍色背景 */
            font-weight: normal;
        }

        /* 響應式設計 */
        @media screen and (max-width: 768px) {
            th, td {
                font-size: 1em;
            }
        }
    </style>
</head>
