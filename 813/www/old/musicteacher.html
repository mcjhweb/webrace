<h1>介紹導師</h1>

<p><span>姓名：</span>萬0庭</p>

<p><span>學生的介紹：</span></p>

<p>老師的教學風格非常幽默又有趣。每堂課，她都會鼓勵我們主動參與，無論是演奏技巧，還是表演練習，張老師總是能以輕鬆的方式讓我們對音
樂更加投入。，</p>

<p>最棒的是，老師總是很有耐心，無論我們有什麼問題，她都會耐心地解答。有時候，老師也會讓我們看一些用各種方式來呈現音樂的影片，這讓
我們覺得音樂真的很有趣，也激發了我們學習的熱情</p>

<p>總結來說，老師是一位很親切、專業的老師，她讓我們在學音樂的過程中充滿了樂趣。每次上她的課，我們都覺得很開心，也學到了很多。</p>
