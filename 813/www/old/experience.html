<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級網頁競賽心得</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: "Microsoft JhengHei", "標楷體", sans-serif;
      background: #CCCCFF;
      margin: 0;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 10px 20px;
      text-align: left;
    }

    header a {
      color: #0077cc;
      font-size: 1em;
      text-decoration: none;
    }

    header a:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 2em;
      color: #333;
      margin: 10px 0 20px 0;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin: 10px 0 5px 0;
    }

    li {
      font-size: 1.5em;
      color: #4B0082;
      margin-bottom: 5px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      padding: 20px 30px;
      margin-bottom: 20px;
      max-width: 800px;
      color: #444;
      text-align: center; /* 文字跟頭像都置中 */
    }

    .profile-pic {
      width: 150px;
      height: 150px;
      border-radius: 1%; /* 圓形 */
      object-fit: cover;
      background: #eee;
      margin: 10px auto 20px;
      display: block;
    }

    .card-content {
      text-align: left; /* 只有文字部分靠左 */
      line-height: 1.6;
      font-size: 1em;
    }

  </style>
</head>

<body>
<ul>
  <li>心得</li>
</ul>
   <div class="card">
 <div>
    這次班級競賽不僅讓我們提升了自己的網頁設計能力，也讓我們明白了在設計過程中要兼顧美觀與實用性，也學會了如何解決一些技術上的問題。最重要的是，這次經歷讓我深刻體會到團隊合作的力量，並且明白了每個人在團隊中的角色和貢獻都是至關重要的。透過這次的競賽，我們不但學到了更多關於網頁設計的訣竅，也對這個領域有了更深的了解。
 </div>
 </div>
</body>
</html>
