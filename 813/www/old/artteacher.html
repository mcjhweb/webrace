<!DOCTYPE html>

<head>

  <title>介紹導師</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", "標楷體", sans-serif;
      background: #CCCCFF;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column; /* 垂直排列 */
      justify-content: flex-start; /* 垂直上方對齊 */
      align-items: center; /* 水平置中 */
      min-height: 80vh;
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      text-decoration: none;
      font-size: 18px;
      color: #333;
    }

    .back-link:hover {
      color: #0077cc;
    }

    .card {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      text-align: center;
      margin-top: 0px; /* 往下推一點，看起來更自然 */
    }

    .card h1 {
      font-size: 2em;
      color: #333;
      margin-bottom: 20px;
    }

    .card p {
      font-size: 1.1em;
      color: #444;
      line-height: 1.8;
      text-align: left;
      margin-bottom: 10px;
    }

    .card p span {
      font-weight: bold;
      color: #0077cc;
    }

<body>

  <a href="teacher.html" class="back-link">← 返回</a>

  <div class="card">
    <h1>介紹導師</h1>
	<p><span>姓名：</span>張0堯</p>
    <p><span>老師介紹：</span></p>
    <p>我們的美術老師是一位非常隨和且富有耐心的人。他總是以輕鬆、愉快的方式帶領我們進入藝術的世界，讓每堂課都充滿創意和樂趣。</p>
    <p>老師鼓勵我們自由發揮，不拘泥於傳統的繪畫方式，並且會耐心指導我們如何改善自己的作品。</p>
    <p>無論我們遇到困難，老師總是會細心地給予建議，幫助我們提升技術。</p>
    <p>在他的課堂上，我們不僅學會了如何繪畫，更學會了如何表達自己的想法與創意。</p>
  </div>
