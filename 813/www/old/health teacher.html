<h1>介紹導師</h1>

<p><span>姓名：蔡0宗</span></p>

<p><span>學生的介紹：</span></p>

<p>老師在課堂中常常使用影片、動畫、等工具來輔助教學，讓我們能夠更直觀地了解健康概念和技巧。</p>

<p>老師會教我們如何選擇健康的食物，並且了解營養搭配的重要性。從食物金字塔到三餐飲食原則，都能幫助我們養成正確的飲食習慣。</p>

<p>健教老師不僅是傳授我們健康知識，更是引導我們如何在日常生活中養成良好的習慣，保持身心的平衡。透過老師的教學，我們不僅學會了如何
選擇健康的食物，還能掌握運動技巧和急救技能，這些都將陪伴我們一生。</p>
