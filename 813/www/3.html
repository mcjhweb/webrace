<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>813 班級時光</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #e6e6fa 0%, #ccccff 100%);
            font-family: "微軟正黑體", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* 讓內容在畫面上方、中間、下方均勻分佈 */
            overflow: hidden;
        }

        /* 標題設計 */
        .memories-header {
            margin-bottom: 20px; /* 標題下方的間距 */
            text-align: center;
        }

        .memories-header h1 {
            font-size: 32px;
            color: #4a4a8a;
            letter-spacing: 5px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }

        /* 輪播區域容器 */
        .slideshow-container {
            position: relative;
            width: 350px;
            height: 450px;
            perspective: 1000px;
        }

        /* 拍立得照片外框風格 */
        .photo-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: white;
            padding: 15px 15px 60px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            pointer-events: none;
        }

        .photo-card.active {
            opacity: 1;
            z-index: 5;
            pointer-events: auto;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .caption {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 20px;
            color: #555;
            font-weight: bold;
            font-family: "標楷體", serif;
        }

        /* --- 導覽點控制區：取消絕對定位，改用 Margin 調整間距 --- */
        .dot-container {
            display: flex;
            gap: 15px;
            margin-top: 40px;    /* 照片與圓點的間距：這裡可以控制圓點不疊到照片 */
            margin-bottom: 40px; /* 圓點與底部文字的間距：這裡控制下方留白 */
            z-index: 20;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: rgba(74, 74, 138, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot:hover {
            background-color: rgba(74, 74, 138, 0.6);
        }

        .dot.active {
            background-color: #4a4a8a;
            transform: scale(1.3);
            box-shadow: 0 0 8px rgba(74, 74, 138, 0.5);
        }

        /* 底部裝飾文字 */
        .bg-text {
            color: rgba(100, 100, 150, 0.5);
            font-size: 14px;
            font-style: italic;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="memories-header">
        <h1>813回憶錄</h1>
    </div>

    <div class="slideshow-container">
        <div class="photo-card active">
            <img src="p1.jpg" alt="7年級校慶">
            <div class="caption">「 7年級校慶 」</div>
        </div>

        <div class="photo-card">
            <img src="p2.jpg" alt="7年級趣味競賽">
            <div class="caption">「 7年級趣味競賽 」</div>
        </div>

        <div class="photo-card">
            <img src="p3.jpg" alt="為老師慶生">
            <div class="caption">「 為老師慶生 」</div>
        </div>
    </div>

    <div class="dot-container">
        <span class="dot active" onclick="jumpToPhoto(0)"></span>
        <span class="dot" onclick="jumpToPhoto(1)"></span>
        <span class="dot" onclick="jumpToPhoto(2)"></span>
    </div>

    <div class="bg-text">Memory remains forever...</div>

    <script>
        let currentIndex = 0;
        const photos = document.querySelectorAll('.photo-card');
        const dots = document.querySelectorAll('.dot');
        const totalPhotos = photos.length;
        let slideInterval;

        function updateDisplay(index) {
            photos.forEach(p => p.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            currentIndex = index;
            photos[currentIndex].classList.add('active');
            dots[currentIndex].classList.add('active');
        }

        function startAutoSlide() {
            slideInterval = setInterval(() => {
                let nextIndex = (currentIndex + 1) % totalPhotos;
                updateDisplay(nextIndex);
            }, 2000); 
        }

        function jumpToPhoto(index) {
            clearInterval(slideInterval);
            updateDisplay(index);
            startAutoSlide();
        }

        startAutoSlide();
    </script>

</body>
</html>
