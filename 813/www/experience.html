<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>班網心得展示</title>
    <style>
        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            /* 使用 #CCCCFF 製作的柔和漸層 */
            background: linear-gradient(135deg, #CCCCFF 0%, #E6E6FA 100%);
            min-height: 100vh;
            color: #444; /* 深色文字更適合淡色背景 */
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            color: #4B0082; /* 深紫色標題 */
            margin-bottom: 50px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 4px rgba(255, 255, 255, 0.8);
        }

        .card {
            /* 毛玻璃效果：白色半透明 */
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(75, 0, 130, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(75, 0, 130, 0.15);
        }

        .card p {
            font-size: 1.15rem;
            line-height: 1.9;
            margin: 0 0 15px 0;
            color: #333;
        }

        .card p:last-child {
            margin-bottom: 0;
        }

        /* 響應式調整 */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .container { padding: 40px 15px; }
            .card { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>班網心得</h1>

        <div class="card">
            <!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>班網比賽心得</title>
<style>
  body {
    font-family: "微軟正黑體", sans-serif;
    line-height: 1.8;
  }

  .yellow { background-color: yellow; font-weight: bold; }
  .green { color: green; font-weight: bold; }

</head>

<body>


<p>這次參加班網比賽，讓我學到團隊合作的重要性。我們分工合作，從設計到內容撰寫都互相配合。過程中雖然遇到不少困難，但透過討論與修改，最終順利完成作品。這次經驗不僅提升了我的能力，也讓我學會如何解決問題，收穫很多。</p>
        </div>
    </div>
</body>
</html>
