<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>師長介紹 - 813 班級網頁</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #CCCCFF;
            font-family: "微軟正黑體", sans-serif;
            padding: 40px 20px;
        }

        .page-title {
            text-align: center; font-size: 32px; color: #444488;
            margin-bottom: 40px; font-weight: bold;
        }

        #teacher-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .teacher-card {
            background: white; 
            border-radius: 15px; 
            overflow: hidden;
            text-align: center; 
            padding-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            height: 480px; 
        }

        /* 滑鼠移入效果 */
        .teacher-card:hover { 
            transform: translateY(-5px); 
            height: 580px; 
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        /* 照片容器 */
        .teacher-photo { 
            width: 100%; 
            height: 320px; 
            flex-shrink: 0; 
            overflow: hidden;
            background-color: #f8f8ff; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .teacher-photo img { 
            max-width: 100%; 
            height: 100%; 
            object-fit: cover; /* 改為 cover 讓老師的照片看起來更整齊 */
            transition: transform 0.4s ease;
        }

        .teacher-card:hover .teacher-photo img {
            transform: scale(1.05);
        }
        
        .teacher-name { font-size: 24px; font-weight: bold; color: #333366; margin: 15px 0 5px; }

        .teacher-info { 
            font-size: 15px; 
            color: #666; 
            padding: 0 20px; 
            line-height: 1.6;
            flex-grow: 1;
            overflow: hidden;
            transition: all 0.4s ease;
			text-align: left; 
        }

        .teacher-card:hover .teacher-info {
            overflow-y: auto;
        }

        .subject-tag {
            display: inline-block; 
            margin: 10px auto; 
            background: #444488;
            color: white; 
            padding: 5px 18px; 
            border-radius: 20px; 
            font-size: 13px;
            flex-shrink: 0;
            font-weight: bold;
        }

        .teacher-info::-webkit-scrollbar { width: 5px; }
        .teacher-info::-webkit-scrollbar-thumb { background: #CCCCFF; border-radius: 10px; }
    </style>
</head>
<body>
