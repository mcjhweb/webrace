      <td>我們712班的班導是珮伶老師，她主要教<br>

的科目是歷史和山海觀，七上一開學時<br>

就已經下定決心要陪伴我們3年是一位非<br>

常負責任的老師!她總是在每次段考前就<br>

幫我們安排考試，而當我在段考時考不好<br>

時，她也會幫我們分析那些部分是需要再<br>

多加強的部分，非常盡責!<br>
