	  合作社阿姨，目前就職於銘傳國中內部的合作社，就職三年。在這三年期間，對於學生的行為，感覺沒有太大變化<br>
	  而在這三年，最印象深刻的，就是曾經有學生因為沒有當場清點找回的錢，事後返回索取。除了這件事，還有一件事，那便是會有同學無聊到去問旁邊的大同電鍋多少錢<br>
	  阿姨覺得，對於學生來講，合作社可能是部分學生的心靈寄託，或許是因為餓的時候，這裡是可以充飢的地方<br>
	  在這次採訪，我們有兩項重大發現:一是合作社的三大榜首:鍋貼、披薩和杯奶;二是合作社裡面熱賣的披薩，居然可以預訂!<br>
	  在最後，阿姨要送我們銘傳全體學生一句話:即使有找錯錢的事件，但是，阿姨還是愛你們的
