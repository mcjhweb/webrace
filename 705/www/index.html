<script type="text/javascript">
function typeWriter(elementId, text, speed) {
let i = 0;
function type() {
if (i < text.length) {
document.getElementById(elementId).innerHTML += text.charAt(i);
i++;
setTimeout(type, speed);
}
}
type();
}
// 網頁載入後開始執行
window.onload = function() {
// 參數：(元件ID, 文字內容, 速度毫秒)
typeWriter("typewriter-title", "705 首頁", 200);
// 延遲一點點再開始打第二段文字
setTimeout(function() {
typeWriter("typewriter-subtitle", "班級個人網頁", 150);
}, 1500);
};
