<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們的班級照片牆</title>
    <style>
        /* 基礎頁面樣式 */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
        }

        /* 照片牆容器 */
        .photo-container {
            display: grid;
            /* 自動填滿，每張卡片至少 220px */
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }

        /* 卡片外框 */
        .photo-card {
            height: 300px;
            perspective: 1000px; /* 3D 透視深度 */
        }

        /* 內層容器（負責翻轉動畫） */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* 翻轉觸發：滑鼠滑過或點擊時 */
        .photo-card:hover .card-inner {
            transform: rotateY(180deg);
        }

        /* 正面與背面的共同樣式 */
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* 隱藏背後的元素 */
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 正面樣式（放照片） */
        .front {
            background-color: #fff;
        }

        .front img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保照片填滿不變形 */
        }

        /* 背面樣式（放文字） */
        .back {
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            color: white;
            transform: rotateY(180deg); /* 初始狀態就是反的 */
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .back h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 5px;
        }

        .back p {
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 5px 0;
        }

        .tag {
            background: rgba(255,255,255,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🌟 7年5班 的點點滴滴</h1>

    <div class="photo-container">
        
        <div class="photo-card">
            <div class="card-inner">
                <div class="front">
                    <img src="p1.jpg" alt="同學照片">
                </div>
                <div class="back">
                    <h3>奠濟宮</h3>
                    <p>「參訪台灣傳統廟宇文化！」</p>
                    <p>青龍、白虎、太極八卦陣</p>
                                 </div>
            </div>
        </div>

        <div class="photo-card">
            <div class="card-inner">
                <div class="front">
                    <img src="p3.jpg" alt="同學照片">
                </div>
                <div class="back">
                    <h3>中正公園</h3>
                    <p>「基隆日式時期就有的公園。」</p>
                    <p>樓梯好多好難爬</p>
                    
                </div>
            </div>
        </div>

        <div class="photo-card">
            <div class="card-inner">
                <div class="front">
                    <img src="p2.jpg" alt="同學照片">
                </div>
                <div class="back">
                    <h3>金雞橋</h3>
                    <p>「基隆的十二生肖橋。」</p>
                    <p>以前都還沒來過</p>
                    
                </div>
            </div>
        </div>

    </div>

</body>
</html>
