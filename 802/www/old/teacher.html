<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="zh-Hant">
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="content-type">
    <title>導師介紹</title>
    <style>
    body {
      margin: 0;
      font-family: "微軟正黑體", sans-serif;
    }

    header {
      background-color: #f2f2f2;
      text-align: center;
      padding: 1.5em;
      font-size: 2em;
      letter-spacing: 2px;
    }

    .season {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      flex-direction: column;
      overflow: hidden;
      cursor: pointer;
      background-size: cover;
      background-position: center;
      background-image: url('../pic/tcy.jpg');
    }

    .season::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
    }

    .season:hover::before {
      opacity: 1;
    }

    .season .teacher-name,
    .season .poetry {
      position: relative;
      z-index: 2;
      transition: opacity 0.3s;
    }

    .season .poetry {
      opacity: 0;
      font-size: 1.5em;
      font-style: italic;
    }

    .season:hover .poetry {
      opacity: 1;
    }

    .teacher-name {
      font-size: 2.8em;
      margin: 0.3em 0;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 1em;
      font-size: 0.9em;
    }

    /* 響應式設計 */
    @media (max-width: 768px) {
      .teacher-name {
        font-size: 2em;
      }

      .season {
        height: 70vh;
        padding: 1em;
      }

      .season .poetry {
        font-size: 1.2em;
      }
    }
  </style>
  </head>
  <body>
    <header>導師介紹</header>
    <section class="season" aria-label="導師蔡淳昱老師介紹，點擊可顯示座右銘">
      <div class="teacher-name">蔡淳昱老師</div>
      <div class="poetry"> <span>&nbsp;&nbsp;&nbsp; 大家好，我是淳昱老師，702班的導師。<br>
          <br>
          我喜歡運動，面對挑戰及保持健康；我喜歡閱讀，吸收新知及培養思考；我喜歡旅行，親身感受與體驗世界。<br>
          <br>
          期待在這三年裡，能陪伴同學們一起探索與成長，並在成長的道路上留下屬於我們的精彩回憶</span> </div>
    </section>
    <footer>2025.5.2　|　製作：702班網編輯小組<br>
