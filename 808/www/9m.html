<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>808 動物園 | 園區大人物</title>
    <style>
        :root {
            --zoo-green: #2d5a27;
            --zoo-brown: #8b4513;
            --zoo-gold: #d4af37;
            --zoo-light: #f0f4f0;
        }

        html { 
            scroll-behavior: smooth; 
            background-color: var(--zoo-light);
            background-image: radial-gradient(#d1dbd1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }

        header { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px 10px 20px; gap: 15px; 
        }
        @media (min-width: 768px) { header { flex-direction: row; justify-content: flex-start; padding-left: 60px; } }

        /* 懸掛招牌 */
        .hanging-sign {
            background: #fff; border: 5px solid var(--zoo-brown);
            border-radius: 15px; padding: 10px 20px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            position: relative; transform-origin: top center;
            animation: swing 3.5s ease-in-out infinite;
        }
        .hanging-sign::before, .hanging-sign::after { content: ""; position: absolute; top: -60px; width: 4px; height: 60px; background: #333; z-index: -1; }
        .hanging-sign::before { left: 20px; } .hanging-sign::after { right: 20px; }

        /* 導覽列 */
        .nav-btn {
            padding: 8px 16px; background: var(--zoo-green); color: white;
            text-decoration: none; border-radius: 20px; font-weight: bold;
            box-shadow: 0 4px 0px #1a3517; transition: 0.2s; border: none; cursor: pointer;
            display: inline-block;
        }
        .nav-btn:hover { transform: translateY(2px); box-shadow: 0 2px 0px #1a3517; }
        .nav-item { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 0;
            width: 100%; min-width: 120px; background-color: var(--zoo-green);
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 100;
            border-radius: 0 0 10px 10px; overflow: hidden;
        }
        .dropdown-content a {
            color: white; padding: 10px 12px; text-decoration: none;
            display: block; font-size: 0.9rem; transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .dropdown-content a:hover { background-color: #3e7a36; }
        .nav-item:hover .dropdown-content { display: block; }

        /* 容器與標題 */
        .main-container { padding: 0 20px 40px 20px; max-width: 1100px; margin: 0 auto; }
        .main-title { text-align: center; color: var(--zoo-brown); margin: 0; padding: 20px 0; font-size: 2rem; }

        /* 三格佈局 */
        .vip-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1/3); /* 強制三格並排 */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-top: 10px; 
        }
        
        /* 大人物卡片 (主任模板) */
        .vip-card {
            background: white; border-radius: 25px; border: 4px solid var(--zoo-gold);
            overflow: hidden; box-shadow: 0 10px 25px rgba(212,175,55,0.2);
            transition: transform 0.3s;
        }
        .vip-card:hover { transform: translateY(-10px); }
        
        .vip-header { background: linear-gradient(135deg, #d4af37, #f9f1c0); padding: 25px; text-align: center; }
        .vip-photo {
            width: 140px; height: 140px; border-radius: 50%; border: 5px solid white;
            object-fit: cover; background: #eee;
        }

        .vip-info { padding: 20px; text-align: center; }
        .vip-badge {
            background: var(--zoo-brown); color: white; padding: 4px 12px;
            border-radius: 15px; font-size: 0.8rem; font-weight: bold;
            display: inline-block; margin-bottom: 10px;
        }
        .vip-name { font-size: 1.4rem; color: var(--zoo-brown); margin: 0 0 10px 0; }
        .vip-desc { font-size: 0.9rem; color: #555; line-height: 1.6; height: 80px; overflow: hidden; }
        
        .vip-skill {
            display: flex; justify-content: space-around; padding: 15px;
            background: #fff9e6; border-top: 1px solid #eee;
        }
        .skill-item { text-align: center; font-size: 0.8rem; color: var(--zoo-brown); font-weight: bold; }

        @keyframes swing { 0%, 100% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } }

        @media (max-width: 768px) { header { padding: 20px; } .vip-desc { height: auto; } }
		
		.page-banner {
            background: linear-gradient(rgba(45, 90, 39, 0.8), rgba(45, 90, 39, 0.8)), url('106.png');
            background-size: cover; background-position: center;
            height: 200px; display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
		
    </style>
</head>

        <div class="nav-item"><a href="schedule.html" class="nav-btn">📅 演出時程</a></div>
        <div class="nav-item has-submenu">

            <div class="dropdown-content">

<div class="page-banner">

</div>

<main class="main-container">
    <div style="display: flex; justify-content: center; margin-top: 20px;">
        <div class="vip-card" style="max-width: 350px; width: 100%;">
            <div class="vip-header">
               <img src="class/1456.jpg" alt="莫為恩主任" class="vip-photo">

    <p style="text-align: center; color: #888; margin-top: 40px;">※ 遇到大人物時，請保持肅靜並展現最優雅的動物姿態</p>

</html>
