<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銘傳國中 808 動物大圖鑑</title>
    <style>
        :root {
            --zoo-green: #2d5a27;
            --zoo-brown: #8b4513;
            --zoo-light: #f0f4f0;
            --boy-blue: #2196f3;
            --girl-pink: #e91e63;
        }

        html { 
            scroll-behavior: smooth; 
            background-color: var(--zoo-light);
            background-image: radial-gradient(#d1dbd1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }

        header { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 20px; }
        @media (min-width: 768px) { header { flex-direction: row; justify-content: flex-start; padding-left: 60px; } }

        .hanging-sign {
            background: #fff; border: 5px solid var(--zoo-brown);
            border-radius: 15px; padding: 10px 20px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            position: relative; transform-origin: top center;
            animation: swing 3.5s ease-in-out infinite;
        }
        .hanging-sign::before, .hanging-sign::after { content: ""; position: absolute; top: -60px; width: 4px; height: 60px; background: #333; z-index: -1; }
        .hanging-sign::before { left: 20px; } .hanging-sign::after { right: 20px; }

        .nav-btn {
            padding: 8px 16px; background: var(--zoo-green); color: white;
            text-decoration: none; border-radius: 20px; font-weight: bold;
            box-shadow: 0 4px 0px #1a3517; transition: 0.2s; border: none; cursor: pointer;
        }
        .nav-btn:hover { transform: translateY(2px); box-shadow: 0 2px 0px #1a3517; }

        .page-banner {
            background: linear-gradient(rgba(45, 90, 39, 0.8), rgba(45, 90, 39, 0.8)), url('106.png');
            background-size: cover; background-position: center;
            height: 200px; display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        /* 性別中斷標題 */
        .gender-divider {
            width: 100%; margin: 40px 0 20px 0; padding: 15px;
            border-radius: 10px; font-size: 1.6rem; font-weight: bold;
            display: flex; align-items: center; gap: 15px;
        }
        .divider-boy { background: rgba(33, 150, 243, 0.1); border-left: 10px solid var(--boy-blue); color: var(--boy-blue); }
        .divider-girl { background: rgba(233, 30, 153, 0.1); border-left: 10px solid var(--girl-pink); color: var(--girl-pink); }

        .image-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 0 40px; }
        .grid-item {
            flex: 1; min-width: 180px; max-width: 220px;
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            cursor: pointer; transition: 0.3s; text-align: center;
        }
        .grid-item:hover { transform: translateY(-10px); }
        .grid-item img { width: 100%; height: 140px; object-fit: contain; background: #f9f9f9; border-radius: 10px; margin-bottom: 10px; }
        .grid-item p { margin: 5px 0; font-weight: bold; font-size: 1.1rem; }

        /* 彈窗樣式 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 9999; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white; width: 90%; max-width: 850px;
            display: flex; border-radius: 25px; overflow: hidden; position: relative; max-height: 90vh;
        }
        #mImg { width: 45%; object-fit: contain; background: #f7f7f7; }
        .modal-info { flex: 1; padding: 30px; overflow-y: auto; text-align: left; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 35px; cursor: pointer; color: #888; }
        .tag { display: inline-block; background: #eee; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; margin: 5px 5px 5px 0; }

        @keyframes swing { 0%, 100% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } }
        @media (max-width: 700px) { .modal-content { flex-direction: column; } #mImg { width: 100%; max-height: 35vh; } }
    </style>
</head>

<div id="zooModal" class="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="mImg" src="">
        <div class="modal-info">
            <h2 id="mTitle" style="margin: 0; color: var(--zoo-brown);">名稱</h2>
            <div style="margin: 15px 0;"><span id="mType" class="tag"></span><span id="mHabit" class="tag"></span></div>
            <hr style="border: 0.5px solid #eee; margin: 20px 0;">
            <div id="mDescArea" style="color:#555; line-height:1.8;"></div>
        </div>
    </div>
</div>

<script>
    function openModal(name, type, habit, desc, img) {
        document.getElementById('mTitle').innerText = name;
        document.getElementById('mType').innerText = type;
        document.getElementById('mHabit').innerText = habit;
        document.getElementById('mImg').src = img;
        document.getElementById('mDescArea').innerText = desc;
        document.getElementById('zooModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('zooModal').style.display = 'none'; }
    function closeModalOutside(event) { if (event.target.id === "zooModal") closeModal(); }
</script>
