<script>
window.onload = function() {
    function resizeMap() {
        const maps = document.getElementsByTagName('map');
        for (let i = 0; i < maps.length; i++) {
            const map = maps[i];
            const img = document.querySelector(`img[usemap="#${map.name}"]`);
            if (!img) continue;

            // 取得圖片原始寬度 (如果標籤沒寫，會抓實際圖檔寬度)
            const naturalWidth = img.naturalWidth;
            if (naturalWidth === 0) return; // 確保圖片已載入

            const areas = map.getElementsByTagName('area');
            const ratio = img.offsetWidth / naturalWidth; // 計算縮放比例

            for (let j = 0; j < areas.length; j++) {
                const area = areas[j];
                // 儲存原始座標以便重複計算
                if (!area.dataset.coords) {
                    area.dataset.coords = area.coords;
                }
                
                const coords = area.dataset.coords.split(',');
                const newCoords = coords.map(c => Math.round(parseInt(c) * ratio));
                area.coords = newCoords.join(',');
            }
        }
    }

    // 初始化並監聽視窗縮放
    resizeMap();
    window.addEventListener('resize', resizeMap);
};
</script>
