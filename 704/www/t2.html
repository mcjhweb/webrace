<style>
body {
  margin: 0;
  background: black;
}

.bg {
  width: 100%;     /* 寬度撐滿 */
  height: auto;    /* 高度等比例 */
  display: block;  /* 去掉圖片底部空隙 */
}
</style>
<style>

:root {
  --menu-width: 250px;
  --menu-bg: #004D66;
  --menu-text: #E0F7FA;
  --menu-item-bg: #007B8F;
  --submenu-bg: #005F73;
  --btn-size: 50px;
  --btn-top: 20px;
  --btn-left: 20px;
  --menu-zindex: 500;
  --btn-zindex: 1000;
  --menu-hidden-offset: 5px;
  --menu-radius: 12px;
}
#menu {
  position: fixed;
  top: 0;
  left: -300px;
  width: var(--menu-width);
  height: 100%;
  background: var(--menu-bg);
  color: var(--menu-text);
  transition: left 0.4s;
  padding: 20px;
  z-index: var(--menu-zindex);
  overflow-y: auto;
  border-top-right-radius: var(--menu-radius);
  border-bottom-right-radius: var(--menu-radius);
}
#menuBtn {
  position: fixed;
  top: var(--btn-top);
  left: var(--btn-left);
  width: var(--btn-size);
  cursor: pointer;
  z-index: var(--btn-zindex);
  border-radius: 8px;
}
.menu-item { 
  display:block; padding:10px; margin:5px 0; background:var(--menu-item-bg); color:var(--menu-text); text-decoration:none; cursor:pointer; border-radius:8px;
}
.menu-item:hover { background: rgba(255,255,255,0.2); color:#000; }
.sub-menu{display:none;background:var(--submenu-bg);padding-left:15px;border-radius:6px;}
.sub-menu a{display:block;padding:5px 10px;color:var(--menu-text);text-decoration:none;}
.sub-menu a:hover{background: rgba(255,255,255,0.2); color:#000;}

</style>
<img src="jpg-png-gif/menu.jpg" id="menuBtn" onclick="toggleMenu()" alt="&#38283;&#21855;&#36984;&#21934;">

</div>


<script>
let open = false;
function toggleMenu() {
  let menu = document.getElementById("menu");
  if(open){
    menu.style.left = "-300px";
  } else {
    menu.style.left = "0";
  }
  open = !open;
}
function toggleSub(el){
  let sub = el.querySelector(".sub-menu");
  sub.style.display = sub.style.display==="block"?"none":"block";
}
</script>
