<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="zh-tw">
<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級課表</title>


  <style>
:root{
--main:#5b3a1b;
--accent:#f59e0b;
--glass:rgba(255,255,255,0.75);
}
body{
margin:0;
font-family:"Microsoft JhengHei", sans-serif;
background:linear-gradient(-45deg,#fff7cc,#fde68a,#fff1b8,#fef3c7);
background-size:400% 400%;
animation:bg 15s ease infinite;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.container{
padding:40px;
}
.title{
text-align:center;
font-size:2.5rem;
color:var(--main);
margin-bottom:20px;
}
/* 卡片 */
.card{
background:var(--glass);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
box-shadow:0 15px 35px rgba(0,0,0,.1);
overflow:auto;
}
/* 表格 */
table{
width:100%;
border-collapse:collapse;
min-width:800px;
}
th, td{
padding:14px;
text-align:center;
border-radius:10px;
}
th{
background:var(--main);
color:white;
}
td{
background:white;
transition:.2s;
}
td:hover{
background:#fff7d6;
transform:scale(1.05);
}
/* 返回鍵 */
.back{
position:fixed;
top:20px;
left:20px;
background:white;
border:none;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}
  </style>
</head>


<body>

<button class="back" onclick="goBack()">&larr;
返回動物園</button>

</html>
