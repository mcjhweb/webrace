}
.card:hover{
transform:translateY(-8px) scale(1.03);
}
/* &#22294;&#29255; */
.card img{
width:100%;
height:320px;object-fit:cover;
}
/* &#25991;&#23383; */

}
.name{

margin-bottom:8px;
}
.desc{

color:#555;
line-height:1.6;
}
/* &#36820;&#22238;&#37749; */

border:none;

border-radius:12px;

}
